<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TeleDrop</title>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    /* ── PIN Overlay ──────────────────────────────────────────────────── */
    #pin-overlay {
      position: fixed;
      inset: 0;
      background: #0d0d0d;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #pin-overlay.hidden { display: none; }

    #pin-card {
      background: #161616;
      border: 1px solid #252525;
      border-radius: 20px;
      padding: 44px 36px 36px;
      width: 100%;
      max-width: 340px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .pin-logo { color: #4a9eff; margin-bottom: 6px; }

    #pin-card h2 {
      font-size: 1.55rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    #pin-card p { font-size: 0.82rem; color: #555; margin-top: -6px; }

    #pin-input {
      width: 100%;
      background: #0f0f0f;
      border: 1px solid #2e2e2e;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 1.15rem;
      letter-spacing: 0.25em;
      padding: 12px 14px;
      outline: none;
      text-align: center;
      transition: border-color 0.15s;
      margin-top: 4px;
    }

    #pin-input:focus { border-color: #4a9eff; }
    #pin-input.shake { animation: shake 0.35s ease; border-color: #e05252; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      60%       { transform: translateX(6px); }
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 8px;
      align-self: flex-start;
      cursor: pointer;
      user-select: none;
    }

    .remember-row input[type="checkbox"] {
      width: 15px; height: 15px;
      accent-color: #4a9eff;
      cursor: pointer;
    }

    .remember-row span { font-size: 0.82rem; color: #666; }

    #pin-submit {
      width: 100%;
      background: #4a9eff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      padding: 13px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 2px;
    }

    #pin-submit:hover { background: #6ab4ff; }
    #pin-submit:disabled { opacity: 0.45; cursor: default; }

    #pin-error { font-size: 0.8rem; color: #e05252; min-height: 1em; text-align: center; }

    /* ── Main App ─────────────────────────────────────────────────────── */
    #app {
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    #app[hidden] { display: none; }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .app-title {
      font-size: 1.7rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    #lock-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #555;
      font-size: 0.78rem;
      padding: 6px 12px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }

    #lock-btn:hover { border-color: #555; color: #999; }

    /* ── Mode tabs ────────────────────────────────────────────────────── */
    .mode-tabs {
      display: flex;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 10px;
    }

    .mode-tab {
      flex: 1;
      padding: 8px 6px;
      font-size: 0.8rem;
      font-weight: 500;
      border: none;
      background: transparent;
      color: #555;
      cursor: pointer;
      transition: background 0.12s, color 0.12s;
    }

    .mode-tab + .mode-tab { border-left: 1px solid #2a2a2a; }
    .mode-tab.active { background: #fff; color: #000; }
    .mode-tab:not(.active):hover { background: #1c1c1c; color: #bbb; }

    /* ── Drop zone ────────────────────────────────────────────────────── */
    #drop-zone {
      min-height: 200px;
      background: #141414;
      border: 2px dashed #272727;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, opacity 0.15s;
      margin-bottom: 6px;
      position: relative;
    }

    #drop-zone.drag-over {
      border-color: #4a9eff;
      background: #0c1620;
    }

    #drop-zone.dimmed {
      opacity: 0.28;
      pointer-events: none;
      cursor: default;
    }

    /* ── Drop zone: idle state ────────────────────────────────────────── */
    .dz-idle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    #drop-zone[data-state="files"] .dz-idle { display: none; }

    .dz-icon { color: #383838; }

    .dz-label { color: #555; font-size: 0.88rem; line-height: 1.5; }
    .dz-label strong { display: block; color: #888; font-size: 0.92rem; margin-bottom: 2px; }

    /* ── Drop zone: files state ───────────────────────────────────────── */
    .dz-files-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      width: 100%;
    }

    #drop-zone[data-state="files"] .dz-files-view { display: flex; }

    .file-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      width: 100%;
      max-height: 220px;
      overflow-y: auto;
    }

    /* Image chip */
    .file-chip-img {
      position: relative;
      width: 76px;
      height: 76px;
      flex-shrink: 0;
    }

    .file-chip-img img {
      width: 76px;
      height: 76px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #2a2a2a;
      display: block;
    }

    /* Doc chip */
    .file-chip-doc {
      position: relative;
      display: flex;
      align-items: center;
      gap: 7px;
      background: #0f0f0f;
      border: 1px solid #222;
      border-radius: 8px;
      padding: 9px 28px 9px 10px;
      max-width: 180px;
      flex-shrink: 0;
    }

    .chip-doc-icon { color: #444; flex-shrink: 0; }

    .chip-name {
      font-size: 0.74rem;
      color: #999;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Remove button (shared) */
    .chip-remove {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 50%;
      color: #aaa;
      font-size: 0.7rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      padding: 0;
    }

    .chip-remove:hover { background: #444; color: #fff; }

    .dz-add-hint {
      font-size: 0.74rem;
      color: #383838;
    }

    /* ── Drop warning ─────────────────────────────────────────────────── */
    #drop-warning {
      font-size: 0.78rem;
      color: #e05252;
      min-height: 1.1em;
      margin-bottom: 4px;
      text-align: center;
    }

    /* ── Text input ───────────────────────────────────────────────────── */
    #text-input {
      width: 100%;
      background: #141414;
      border: 1px solid #272727;
      border-radius: 12px;
      color: #e0e0e0;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.55;
      padding: 14px 16px;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
      min-height: 92px;
      margin-bottom: 10px;
    }

    #text-input:focus { border-color: #333; }
    #text-input::placeholder { color: #383838; }

    /* ── Type badge ───────────────────────────────────────────────────── */
    #type-badge {
      font-size: 0.76rem;
      color: #444;
      min-height: 1.1em;
      margin-bottom: 10px;
      transition: color 0.2s;
    }

    #type-badge.active { color: #4a9eff; }

    /* ── Send button ──────────────────────────────────────────────────── */
    #send-btn {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 0.98rem;
      font-weight: 600;
      padding: 14px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      letter-spacing: -0.01em;
    }

    #send-btn:hover:not(:disabled) { background: #e8e8e8; }
    #send-btn:disabled { opacity: 0.35; cursor: default; }

    /* ── Status states ────────────────────────────────────────────────── */
    .status-card {
      width: 100%;
      border-radius: 14px;
      padding: 32px 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
    }

    #state-sending { background: #141414; border: 1px solid #222; }

    .spinner {
      width: 30px; height: 30px;
      border: 2.5px solid #222;
      border-top-color: #888;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .sending-label { font-size: 0.85rem; color: #555; }

    #state-success { background: #0c1a0c; border: 1px solid #1a3a1a; }

    .success-icon { color: #4caf50; }

    .success-label { font-size: 0.92rem; color: #72c472; font-weight: 500; }

    /* Telegram links container */
    #tg-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .tg-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #122012;
      border: 1px solid #244024;
      border-radius: 8px;
      color: #72c472;
      font-size: 0.83rem;
      font-weight: 500;
      padding: 9px 16px;
      text-decoration: none;
      transition: background 0.12s;
      white-space: nowrap;
    }

    .tg-link:hover { background: #1a2e1a; }

    #send-another {
      background: transparent;
      border: 1px solid #1e321e;
      border-radius: 8px;
      color: #456045;
      font-size: 0.8rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }

    #send-another:hover { border-color: #4caf50; color: #72c472; }

    #state-error { background: #1a0c0c; border: 1px solid #3a1a1a; }

    .error-icon { color: #e05252; }
    .error-msg { font-size: 0.88rem; color: #c47272; }

    #retry-btn {
      background: transparent;
      border: 1px solid #3a1e1e;
      border-radius: 8px;
      color: #c47272;
      font-size: 0.8rem;
      padding: 7px 14px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }

    #retry-btn:hover { border-color: #e05252; color: #e05252; }

    #file-input { display: none; }
  </style>
</head>
<body>

  <!-- ── PIN Overlay ─────────────────────────────────────────────────── -->
  <div id="pin-overlay">
    <div id="pin-card">
      <svg class="pin-logo" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
      <h2>TeleDrop</h2>
      <p>Enter your PIN to continue</p>
      <input type="password" id="pin-input" placeholder="••••••" autocomplete="current-password" maxlength="64">
      <label class="remember-row">
        <input type="checkbox" id="remember-me">
        <span>Remember me for 30 days</span>
      </label>
      <button id="pin-submit" type="button">Unlock</button>
      <div id="pin-error" role="alert"></div>
    </div>
  </div>

  <!-- ── Main App ────────────────────────────────────────────────────── -->
  <div id="app" hidden>
    <header class="app-header">
      <span class="app-title">TeleDrop</span>
      <button id="lock-btn" type="button">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
        </svg>
        Lock
      </button>
    </header>

    <!-- Input form -->
    <div id="input-form">
      <!-- Mode tabs -->
      <div class="mode-tabs" id="mode-tabs" role="tablist">
        <button class="mode-tab active" data-mode="auto" type="button" role="tab" aria-selected="true">Auto</button>
        <button class="mode-tab" data-mode="file" type="button" role="tab">File</button>
        <button class="mode-tab" data-mode="text" type="button" role="tab">Text</button>
        <button class="mode-tab" data-mode="link" type="button" role="tab">Link</button>
      </div>

      <!-- Drop zone -->
      <div id="drop-zone" data-state="idle" tabindex="0" role="button" aria-label="Drop files here or click to browse">

        <!-- Idle state -->
        <div class="dz-idle">
          <svg class="dz-icon" width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="16 16 12 12 8 16"></polyline>
            <line x1="12" y1="12" x2="12" y2="21"></line>
            <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
          </svg>
          <div class="dz-label">
            <strong>Drop files here</strong>
            or click to browse
          </div>
        </div>

        <!-- Files staged state -->
        <div class="dz-files-view">
          <div class="file-chips" id="file-chips"></div>
          <div class="dz-add-hint">drop or click to add more</div>
        </div>

      </div>

      <!-- Drop warning (oversized files etc.) -->
      <div id="drop-warning"></div>

      <!-- Text input -->
      <textarea id="text-input" placeholder="Paste a link or type a note…" rows="3" spellcheck="true"></textarea>

      <!-- Type badge -->
      <div id="type-badge" aria-live="polite"></div>

      <!-- Send button -->
      <button id="send-btn" type="button" disabled>Send</button>
    </div>

    <!-- Sending state -->
    <div id="state-sending" class="status-card" role="status" aria-live="polite">
      <div class="spinner"></div>
      <div class="sending-label" id="sending-label">Sending…</div>
    </div>

    <!-- Success state -->
    <div id="state-success" class="status-card">
      <svg class="success-icon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      <div class="success-label" id="success-label">Sent to Telegram</div>
      <div id="tg-links"></div>
      <button id="send-another" type="button">Send another</button>
    </div>

    <!-- Error state -->
    <div id="state-error" class="status-card" role="alert">
      <svg class="error-icon" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <div class="error-msg" id="error-msg">Something went wrong.</div>
      <button id="retry-btn" type="button">Try again</button>
    </div>
  </div>

  <input type="file" id="file-input" multiple>

  <script>
    (function () {
      'use strict';

      // ── Elements ─────────────────────────────────────────────────────────
      const pinOverlay   = document.getElementById('pin-overlay');
      const pinInput     = document.getElementById('pin-input');
      const rememberMe   = document.getElementById('remember-me');
      const pinSubmit    = document.getElementById('pin-submit');
      const pinError     = document.getElementById('pin-error');
      const app          = document.getElementById('app');
      const lockBtn      = document.getElementById('lock-btn');
      const modeTabs     = document.getElementById('mode-tabs');
      const dropZone     = document.getElementById('drop-zone');
      const fileInput    = document.getElementById('file-input');
      const fileChips    = document.getElementById('file-chips');
      const dropWarning  = document.getElementById('drop-warning');
      const textInput    = document.getElementById('text-input');
      const typeBadge    = document.getElementById('type-badge');
      const sendBtn      = document.getElementById('send-btn');
      const inputForm    = document.getElementById('input-form');
      const stateSending = document.getElementById('state-sending');
      const sendingLabel = document.getElementById('sending-label');
      const stateSuccess = document.getElementById('state-success');
      const successLabel = document.getElementById('success-label');
      const tgLinks      = document.getElementById('tg-links');
      const sendAnother  = document.getElementById('send-another');
      const stateError   = document.getElementById('state-error');
      const errorMsgEl   = document.getElementById('error-msg');
      const retryBtn     = document.getElementById('retry-btn');

      // ── App state ─────────────────────────────────────────────────────────
      let mode = 'auto';
      // Each entry: { file: File, previewUrl: string|null }
      let stagedFiles = [];
      let dragCounter = 0;
      let warnTimer = null;

      // ── Auth ──────────────────────────────────────────────────────────────
      function getToken() {
        const s = sessionStorage.getItem('teledrop_token');
        if (s) return s;
        const m = document.cookie.match(/(?:^|;\s*)teledrop_auth=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : null;
      }

      function saveToken(t) { sessionStorage.setItem('teledrop_token', t); }

      function clearToken() {
        sessionStorage.removeItem('teledrop_token');
        document.cookie = 'teledrop_auth=; Path=/; Max-Age=0; SameSite=Strict';
      }

      function showPinOverlay() {
        pinOverlay.classList.remove('hidden');
        app.hidden = true;
        pinInput.value = '';
        pinError.textContent = '';
        pinInput.classList.remove('shake');
        setTimeout(() => pinInput.focus(), 50);
      }

      function showApp() {
        pinOverlay.classList.add('hidden');
        app.hidden = false;
      }

      // Init
      getToken() ? showApp() : showPinOverlay();

      // ── PIN flow ──────────────────────────────────────────────────────────
      async function submitPin() {
        const pin = pinInput.value;
        if (!pin) return;
        pinSubmit.disabled = true;
        pinError.textContent = '';

        try {
          const res = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pin, remember: rememberMe.checked }),
          });
          const data = await res.json();
          if (!res.ok) {
            pinError.textContent = data.error || 'Incorrect PIN';
            pinInput.classList.remove('shake');
            void pinInput.offsetWidth;
            pinInput.classList.add('shake');
            pinInput.select();
          } else {
            saveToken(data.token);
            showApp();
          }
        } catch {
          pinError.textContent = 'Network error — try again';
        } finally {
          pinSubmit.disabled = false;
        }
      }

      pinSubmit.addEventListener('click', submitPin);
      pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPin(); });
      lockBtn.addEventListener('click', () => { clearToken(); showPinOverlay(); });

      // ── Mode tabs ─────────────────────────────────────────────────────────
      modeTabs.addEventListener('click', (e) => {
        const tab = e.target.closest('.mode-tab');
        if (!tab) return;
        modeTabs.querySelectorAll('.mode-tab').forEach(t => {
          t.classList.remove('active');
          t.setAttribute('aria-selected', 'false');
        });
        tab.classList.add('active');
        tab.setAttribute('aria-selected', 'true');
        mode = tab.dataset.mode;

        if (mode === 'text' || mode === 'link') clearFiles();
        dropZone.classList.toggle('dimmed', mode === 'text' || mode === 'link');

        textInput.placeholder = mode === 'link' ? 'Paste a URL…'
          : mode === 'text' ? 'Type a note…'
          : 'Paste a link or type a note…';

        refreshBadgeAndBtn();
      });

      // ── Type detection ────────────────────────────────────────────────────
      function detectType() {
        if (mode === 'file') {
          return stagedFiles.length ? 'files' : null;
        }
        if (mode === 'text') return textInput.value.trim() ? 'text' : null;
        if (mode === 'link') return textInput.value.trim() ? 'link' : null;
        // Auto
        if (stagedFiles.length) return 'files';
        const t = textInput.value.trim();
        if (!t) return null;
        return /^https?:\/\//i.test(t) ? 'link' : 'text';
      }

      const TYPE_LABELS = { files: '📎 Files', link: '🔗 Link', text: '📝 Text note' };

      function refreshBadgeAndBtn() {
        const type = detectType();

        if (mode === 'auto' && type) {
          const label = type === 'files'
            ? (stagedFiles.length === 1 ? '📎 File' : `📎 ${stagedFiles.length} files`)
            : TYPE_LABELS[type];
          typeBadge.textContent = 'Detected: ' + label;
          typeBadge.classList.add('active');
        } else {
          typeBadge.textContent = '';
          typeBadge.classList.remove('active');
        }

        sendBtn.disabled = !type;
      }

      textInput.addEventListener('input', refreshBadgeAndBtn);

      // ── File management ───────────────────────────────────────────────────
      function addFiles(fileList) {
        const oversized = [];
        for (const file of fileList) {
          if (file.size > 100 * 1024 * 1024) {
            oversized.push(file.name);
            continue;
          }
          const previewUrl = file.type.startsWith('image/') ? URL.createObjectURL(file) : null;
          stagedFiles.push({ file, previewUrl });
        }
        if (oversized.length) {
          const names = oversized.length === 1
            ? `"${oversized[0]}" is`
            : `${oversized.length} files are`;
          showDropWarning(`${names} over the 100 MB limit and were skipped.`);
        }
        renderChips();
        refreshBadgeAndBtn();
      }

      function removeFileAt(index) {
        const item = stagedFiles[index];
        if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
        stagedFiles.splice(index, 1);
        renderChips();
        refreshBadgeAndBtn();
      }

      function clearFiles() {
        stagedFiles.forEach(item => { if (item.previewUrl) URL.revokeObjectURL(item.previewUrl); });
        stagedFiles = [];
        renderChips();
        refreshBadgeAndBtn();
      }

      function renderChips() {
        fileChips.innerHTML = '';
        dropZone.dataset.state = stagedFiles.length ? 'files' : 'idle';

        stagedFiles.forEach((item, i) => {
          const chip = document.createElement('div');

          if (item.previewUrl) {
            chip.className = 'file-chip-img';
            const img = document.createElement('img');
            img.src = item.previewUrl;
            img.alt = item.file.name;
            img.title = item.file.name;
            chip.appendChild(img);
          } else {
            chip.className = 'file-chip-doc';
            const icon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            icon.setAttribute('class', 'chip-doc-icon');
            icon.setAttribute('width', '16'); icon.setAttribute('height', '16');
            icon.setAttribute('viewBox', '0 0 24 24'); icon.setAttribute('fill', 'none');
            icon.setAttribute('stroke', 'currentColor'); icon.setAttribute('stroke-width', '1.8');
            icon.setAttribute('stroke-linecap', 'round'); icon.setAttribute('stroke-linejoin', 'round');
            icon.innerHTML = '<path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path><polyline points="13 2 13 9 20 9"></polyline>';
            const name = document.createElement('span');
            name.className = 'chip-name';
            name.textContent = item.file.name;
            name.title = item.file.name;
            chip.appendChild(icon);
            chip.appendChild(name);
          }

          const rmBtn = document.createElement('button');
          rmBtn.className = 'chip-remove';
          rmBtn.type = 'button';
          rmBtn.textContent = '×';
          rmBtn.setAttribute('aria-label', 'Remove ' + item.file.name);
          rmBtn.addEventListener('click', (e) => { e.stopPropagation(); removeFileAt(i); });
          chip.appendChild(rmBtn);

          fileChips.appendChild(chip);
        });
      }

      function showDropWarning(msg) {
        dropWarning.textContent = msg;
        clearTimeout(warnTimer);
        warnTimer = setTimeout(() => { dropWarning.textContent = ''; }, 5000);
      }

      // ── Drop zone interactions ────────────────────────────────────────────
      dropZone.addEventListener('click', (e) => {
        if (e.target.closest('.chip-remove')) return;
        if (dropZone.classList.contains('dimmed')) return;
        fileInput.click();
      });

      dropZone.addEventListener('keydown', (e) => {
        if ((e.key === 'Enter' || e.key === ' ') && !dropZone.classList.contains('dimmed')) {
          e.preventDefault();
          fileInput.click();
        }
      });

      fileInput.addEventListener('change', () => {
        if (fileInput.files.length) addFiles(Array.from(fileInput.files));
        fileInput.value = '';
      });

      document.body.addEventListener('dragenter', (e) => {
        e.preventDefault();
        dragCounter++;
        if (!dropZone.classList.contains('dimmed')) dropZone.classList.add('drag-over');
      });

      document.body.addEventListener('dragover', (e) => e.preventDefault());

      document.body.addEventListener('dragleave', () => {
        if (--dragCounter <= 0) {
          dragCounter = 0;
          dropZone.classList.remove('drag-over');
        }
      });

      document.body.addEventListener('drop', (e) => {
        e.preventDefault();
        dragCounter = 0;
        dropZone.classList.remove('drag-over');
        if (dropZone.classList.contains('dimmed')) return;
        const files = Array.from(e.dataTransfer.files);
        if (files.length) addFiles(files);
      });

      // Paste files
      document.addEventListener('paste', (e) => {
        if (app.hidden) return;
        const items = Array.from(e.clipboardData.items).filter(i => i.kind === 'file');
        if (!items.length) return;
        e.preventDefault();
        const files = items.map(i => i.getAsFile()).filter(Boolean);
        if (files.length) addFiles(files);
      });

      // ── Send ──────────────────────────────────────────────────────────────
      sendBtn.addEventListener('click', doSend);

      async function doSend() {
        const type = detectType();
        if (!type) return;

        const token = getToken();
        if (!token) { showPinOverlay(); return; }

        if (type === 'text' || type === 'link') {
          setSendingLabel('Sending…');
          showSending();
          const result = await sendPayload(type, null, textInput.value.trim(), token);
          if (!result) return;
          showSuccess([buildTgLink(result.chatId, result.messageId)], 1);
        } else {
          // files — send sequentially
          const snapshot = [...stagedFiles];
          const links = [];

          for (let i = 0; i < snapshot.length; i++) {
            setSendingLabel(snapshot.length > 1
              ? `Sending ${i + 1} of ${snapshot.length}…`
              : 'Sending…');
            showSending();

            const { file } = snapshot[i];
            const fileType = file.type.startsWith('image/') ? 'image' : 'file';
            const result = await sendPayload(fileType, file, null, token);
            if (!result) return; // error already shown
            links.push(buildTgLink(result.chatId, result.messageId));
          }

          showSuccess(links, snapshot.length);
        }
      }

      async function sendPayload(type, file, content, token) {
        try {
          let res;
          if (file) {
            const fd = new FormData();
            fd.append('type', type);
            fd.append('file', file);
            res = await fetch('/api/send', {
              method: 'POST',
              headers: { 'Authorization': 'Bearer ' + token },
              body: fd,
            });
          } else {
            res = await fetch('/api/send', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token,
              },
              body: JSON.stringify({ type, content }),
            });
          }

          if (res.status === 401) { clearToken(); showPinOverlay(); return null; }

          const data = await res.json();
          if (!res.ok) { showError(data.error || 'Send failed (' + res.status + ')'); return null; }
          return data;
        } catch {
          showError('Network error — check your connection.');
          return null;
        }
      }

      function buildTgLink(chatId, messageId) {
        const linkId = String(chatId).replace(/^-100/, '');
        return `https://t.me/c/${linkId}/${messageId}`;
      }

      // ── UI state helpers ──────────────────────────────────────────────────
      function showIdle() {
        inputForm.style.display    = '';
        stateSending.style.display = 'none';
        stateSuccess.style.display = 'none';
        stateError.style.display   = 'none';
      }

      function showSending() {
        inputForm.style.display    = 'none';
        stateSending.style.display = 'flex';
        stateSuccess.style.display = 'none';
        stateError.style.display   = 'none';
      }

      function setSendingLabel(text) { sendingLabel.textContent = text; }

      function showSuccess(links, count) {
        inputForm.style.display    = 'none';
        stateSending.style.display = 'none';
        stateSuccess.style.display = 'flex';
        stateError.style.display   = 'none';

        successLabel.textContent = count > 1
          ? `Sent ${count} files to Telegram`
          : 'Sent to Telegram';

        tgLinks.innerHTML = '';
        links.forEach((href, i) => {
          const a = document.createElement('a');
          a.className = 'tg-link';
          a.href = href;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          a.textContent = links.length > 1 ? `View message ${i + 1} →` : 'View in Telegram →';
          tgLinks.appendChild(a);
        });
      }

      function showError(msg) {
        inputForm.style.display    = 'none';
        stateSending.style.display = 'none';
        stateSuccess.style.display = 'none';
        stateError.style.display   = 'flex';
        errorMsgEl.textContent = msg || 'Something went wrong.';
      }

      sendAnother.addEventListener('click', () => {
        clearFiles();
        textInput.value = '';
        refreshBadgeAndBtn();
        showIdle();
      });

      retryBtn.addEventListener('click', showIdle);

    })();
  </script>
</body>
</html>
